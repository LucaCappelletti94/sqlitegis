name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    shell: bash

jobs:
  hooks:
    name: prek run --all-files
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Install prek
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/j178/prek/releases/latest/download/prek-installer.sh | sh
      - run: prek run --all-files

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Default features -- the most common consumer build.
          - target: workspace
            cmd: cargo clippy --workspace --all-targets -- -D warnings
          # Union: every feature on. Covers sqlite, sqlite-extension, and
          # diesel-sqlite implicitly, so they don't need their own entries.
          - target: workspace-all-features
            cmd: cargo clippy --workspace --all-features --all-targets -- -D warnings
          # Pure-Rust core only -- catches accidental dep leaks into core.
          - target: no-default-features
            cmd: cargo clippy -p geolite --no-default-features --all-targets -- -D warnings
          # Diesel without a backend -- feature-interaction check the
          # all-features run cannot catch (it always has sqlite on too).
          - target: diesel-only
            cmd: cargo clippy -p geolite --no-default-features --features diesel --all-targets -- -D warnings
          # Postgres backend -- distinct dep tree (libpq via testcontainers).
          - target: diesel-postgres
            cmd: cargo clippy -p geolite --features diesel-postgres --all-targets -- -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: ${{ matrix.cmd }}

  clippy-wasm:
    name: Clippy (WASM)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -p geolite --features sqlite --target wasm32-unknown-unknown -- -D warnings

  test:
    name: Test (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: workspace
            cmd: cargo test --workspace
          # Default features omit sqlite-extension, so the one
          # load_extension-gated test in sqlite_integration.rs would not run
          # under the workspace job. Run that file alone with the feature on.
          - target: sqlite-extension
            cmd: cargo test -p geolite --features sqlite-extension --test sqlite_integration
          - target: doctest-workspace
            cmd: cargo test --doc --workspace
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: ${{ matrix.cmd }}

  msrv:
    name: MSRV (1.86)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace
      - run: cargo check -p geolite --features diesel-sqlite
      - run: cargo check -p geolite --features diesel-postgres

  check-cross-platform:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace
      - run: cargo check -p geolite --features diesel-sqlite
      - run: cargo check -p geolite --features diesel-postgres

  wasm-test:
    name: WASM Test (sqlite)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@wasm-bindgen
      - run: cargo test -p geolite --features sqlite --target wasm32-unknown-unknown --test sqlite_wasm
        env:
          CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUNNER: wasm-bindgen-test-runner
          WASM_BINDGEN_TEST_TIMEOUT: 120

  wasm-test-diesel:
    name: WASM Test (Diesel)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@wasm-bindgen
      - run: cargo test -p geolite --features diesel-sqlite --target wasm32-unknown-unknown --test diesel_wasm_integration
        env:
          CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUNNER: wasm-bindgen-test-runner
          WASM_BINDGEN_TEST_TIMEOUT: 120

  docs:
    name: Docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --quiet
      - run: cargo audit

  test-postgres:
    name: Test (PostGIS)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p geolite --features diesel-postgres --test diesel_postgres_integration

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [fmt, clippy, test, test-postgres, wasm-test, wasm-test-diesel, docs]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo build -p geolite --features sqlite-extension
      - run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - run: cargo llvm-cov --no-clean -p geolite --features diesel-sqlite --lcov --output-path lcov-diesel.info
      - run: cargo llvm-cov --no-clean -p geolite --features diesel-postgres --test diesel_postgres_integration --lcov --output-path lcov-postgres.info
      - uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: lcov.info,lcov-diesel.info,lcov-postgres.info
          fail_ci_if_error: false
          verbose: true
