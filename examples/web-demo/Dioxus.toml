[application]
name = "sqlitegis-web-demo"
default_platform = "web"

[web.app]
title = "SQLiteGIS: SQLite spatial queries in the browser"

[web.watcher]
reload_html = true
watch_path = ["src", "public"]

# Static stylesheet link injected into index.html's <head> at build time so
# the browser fetches CSS in parallel with the WASM bundle. Without this, the
# stylesheet is appended at runtime by Dioxus and the first paint is unstyled
# (FOUC). public/app.css is the source of truth; assets/app.css is unused.
[web.resource]
style = ["/app.css"]

[web.resource.dev]

# wasm-opt was failing with "compile unit size was incorrect (this may be an
# unsupported version of DWARF)" because binaryen does not handle the DWARF
# version emitted by current rustc. Stripping debug info before optimisation
# sidesteps the parse and lets the size pass run.
[web.wasm_opt]
debug = false
level = "4"
