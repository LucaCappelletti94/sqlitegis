# Configuration file for `prek` (https://github.com/j178/prek).
#:schema https://www.schemastore.org/prek.json
#
# One-time setup per checkout:
#   prek install
#
# Run the full default suite locally:
#   prek run --all-files
#
# Run the expensive hooks (Postgres via testcontainers, WASM target):
#   prek run --stage manual --all-files

[[repos]]
repo = "local"
hooks = [
    { id = "cargo-fmt",
      name = "cargo fmt --check",
      entry = "cargo fmt --all -- --check",
      language = "system",
      types = ["rust"],
      pass_filenames = false },

    { id = "cargo-clippy",
      name = "cargo clippy (workspace)",
      entry = "cargo clippy --workspace --all-targets -- -D warnings",
      language = "system",
      types = ["rust"],
      pass_filenames = false },

    { id = "cargo-clippy-all-features",
      name = "cargo clippy (workspace, all-features)",
      entry = "cargo clippy --workspace --all-features --all-targets -- -D warnings",
      language = "system",
      types = ["rust"],
      pass_filenames = false },

    { id = "cargo-test",
      name = "cargo test (workspace)",
      entry = "cargo test --workspace",
      language = "system",
      types = ["rust"],
      pass_filenames = false },

    # The sqlite-extension cdylib is built and smoke-tested by the
    # Python wheel CI; we no longer run a parallel Rust-side load test
    # because sqlite-loadable's bundled SQLite (via sqlite3ext-sys)
    # would collide with libsqlite3-sys in the same test binary.

    { id = "cargo-test-doc",
      name = "cargo test --doc (workspace)",
      entry = "cargo test --doc --workspace",
      language = "system",
      types = ["rust"],
      pass_filenames = false },

    # Manual-stage hooks. Expensive (Docker for Postgres, wasm32 target).
    # Run them explicitly with `prek run --stage manual --all-files`.

    { id = "cargo-test-postgres",
      name = "cargo test (diesel-postgres via testcontainers)",
      entry = "cargo test -p sqlitegis --features diesel-postgres --test diesel_postgres_integration",
      language = "system",
      types = ["rust"],
      pass_filenames = false,
      stages = ["manual"] },

    { id = "cargo-test-wasm-sqlite",
      name = "cargo test (wasm32 sqlite)",
      entry = "cargo test -p sqlitegis --features sqlite --target wasm32-unknown-unknown --test sqlite_wasm",
      language = "system",
      types = ["rust"],
      pass_filenames = false,
      stages = ["manual"] },

    { id = "cargo-test-wasm-diesel",
      name = "cargo test (wasm32 diesel-sqlite)",
      entry = "cargo test -p sqlitegis --features diesel-sqlite --target wasm32-unknown-unknown --test diesel_wasm_integration",
      language = "system",
      types = ["rust"],
      pass_filenames = false,
      stages = ["manual"] },

    { id = "cargo-clippy-wasm",
      name = "cargo clippy (wasm32)",
      entry = "cargo clippy -p sqlitegis --features sqlite --target wasm32-unknown-unknown -- -D warnings",
      language = "system",
      types = ["rust"],
      pass_filenames = false,
      stages = ["manual"] },

    # Python-binding gates. Mirror the steps in
    # .github/workflows/python.yml so local `prek run --all-files`
    # has the same coverage. uv reads the project from
    # bindings/python/pyproject.toml and uses its locked venv.

    { id = "uv-sync-python",
      name = "uv sync --frozen (bindings/python)",
      entry = "uv sync --frozen --group dev --directory bindings/python",
      language = "system",
      types_or = ["python", "toml"],
      pass_filenames = false },

    { id = "ruff-check",
      name = "ruff check (bindings/python)",
      entry = "uv run --directory bindings/python ruff check sqlitegis tests",
      language = "system",
      types_or = ["python", "toml"],
      pass_filenames = false },

    { id = "ruff-format",
      name = "ruff format --check (bindings/python)",
      entry = "uv run --directory bindings/python ruff format --check sqlitegis tests",
      language = "system",
      types_or = ["python", "toml"],
      pass_filenames = false },

    { id = "mypy",
      name = "mypy --strict (bindings/python)",
      entry = "uv run --directory bindings/python mypy sqlitegis tests",
      language = "system",
      types_or = ["python", "toml"],
      pass_filenames = false },

    { id = "python-build-smoke",
      name = "python -m build --wheel + twine check (bindings/python)",
      entry = "bash -c 'cd bindings/python && find dist -mindepth 1 -delete 2>/dev/null; uv run python -m build --wheel && uv run twine check dist/*'",
      language = "system",
      types_or = ["python", "toml"],
      pass_filenames = false },

    # pytest needs the cdylib staged at bindings/python/sqlitegis/_bin/.
    # Build it first, then run the suite (which enforces 100% coverage
    # via the addopts in pyproject.toml). Manual-stage because the
    # cargo build is non-trivial; run with `prek run --stage manual --all-files`.

    { id = "python-pytest",
      name = "pytest + coverage (bindings/python)",
      entry = "bash -c 'cargo build --release --no-default-features --features sqlite-extension,bundled-sqlite && mkdir -p bindings/python/sqlitegis/_bin && cp target/release/libsqlitegis.so bindings/python/sqlitegis/_bin/ && uv run --directory bindings/python pytest'",
      language = "system",
      types_or = ["python", "rust", "toml"],
      pass_filenames = false,
      stages = ["manual"] },
]
